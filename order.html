<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Bloom Anyway - A Reflection on Growth, Resilience, and Turning 40</title>
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" ry="14" fill="%23000000"/><text x="50%" y="52%" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="26" fill="white">BA</text></svg>'>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="usps-api-production.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
        }
        
        .serif {
            font-family: 'Playfair Display', serif;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        .order-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .order-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            font-family: 'Playfair Display', serif;
            color: #ffffff;
        }
        
        .order-subtitle {
            font-size: 1.25rem;
            font-weight: 300;
            color: #cccccc;
        }
        
        .order-form {
            background-color: #111111;
            border: 1px solid #333333;
            border-radius: 0.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .form-section {
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #ffffff;
            border-bottom: 1px solid #333333;
            padding-bottom: 0.5rem;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #ffffff;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #333333;
            border-radius: 0.375rem;
            font-size: 1rem;
            background-color: #000000;
            color: #ffffff;
            transition: border-color 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #666666;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }
        
        .form-input::placeholder {
            color: #666666;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background-color: #ffffff;
            color: #000000;
        }
        
        .btn-primary:hover {
            background-color: #cccccc;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #666666;
        }
        
        .btn-secondary:hover {
            background-color: #333333;
            border-color: #999999;
        }
        
        .order-summary {
            background-color: #111111;
            border: 1px solid #333333;
            border-radius: 0.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: #ffffff;
        }
        
        .summary-row.total {
            font-weight: 700;
            font-size: 1.25rem;
            border-top: 1px solid #333333;
            padding-top: 1rem;
            margin-top: 1rem;
        }
        
        .payment-options {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
        }
        
        .payment-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .payment-option input[type="radio"] {
            accent-color: #ffffff;
        }
        
        .order-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        
        .back-link {
            color: #999999;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-link:hover {
            color: #ffffff;
        }
        
        .error {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            padding: 0.75rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }
        
        .success {
            color: #10b981;
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            padding: 0.75rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 1rem 0.5rem;
            }
            
            .order-title {
                font-size: 2rem;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .order-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Order Header -->
        <div class="order-header">
            <h1 class="order-title serif">Order Bloom Anyway</h1>
            <p class="order-subtitle">Complete your order for this inspiring reflection on growth and resilience</p>
        </div>

        <!-- Order Form -->
        <div class="order-form">
            <!-- Contact Information -->
            <div class="form-section">
                <h2 class="section-title">Contact Information</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address *</label>
                        <input type="email" id="email" name="email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-input">
                    </div>
                </div>
            </div>

            <!-- Shipping Address -->
            <div class="form-section">
                <h2 class="section-title">Shipping Address</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="address1">Street Address *</label>
                        <input type="text" id="address1" name="address1" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="address2">Apartment, Suite, etc.</label>
                        <input type="text" id="address2" name="address2" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="city">City *</label>
                        <input type="text" id="city" name="city" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="state">State *</label>
                        <input type="text" id="state" name="state" class="form-input" required placeholder="e.g., NY">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="zipCode">ZIP Code *</label>
                        <input type="text" id="zipCode" name="zipCode" class="form-input" required maxlength="5" pattern="[0-9]{5}">
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="order-summary">
                <h2 class="section-title">Order Summary</h2>
                <div class="summary-row">
                    <span>Bloom Anyway (Paperback)</span>
                    <span id="bookPrice">$19.99</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span id="shippingCost">Calculating...</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="totalCost">Calculating...</span>
                </div>
            </div>

            <!-- Payment Method -->
            <div class="form-section">
                <h2 class="section-title">Payment Method</h2>
                <div class="payment-options">
                    <div class="payment-option">
                        <input type="radio" id="card" name="payment" value="card" checked>
                        <label for="card">Credit/Debit Card</label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" id="paypal" name="payment" value="paypal">
                        <label for="paypal">PayPal</label>
                    </div>
                </div>
            </div>

            <!-- Order Actions -->
            <div class="order-actions">
                <button type="button" onclick="validateAndContinue()" class="btn btn-primary">
                    <i class="fas fa-lock"></i> Complete Order
                </button>
                <a href="index.html" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back to Website
                </a>
            </div>
        </div>
    </div>

    <script>
        // Initialize USPS API
        let uspsAPI;
        
        try {
            uspsAPI = new USPSAPI();
            console.log('✅ USPS API initialized successfully');
        } catch (error) {
            console.error('❌ USPS API initialization failed:', error);
            // Create fallback API
            uspsAPI = {
                validateAddress: () => ({ isValid: true, message: 'Demo mode' }),
                getShippingRates: () => ({ rates: [{ service: 'Demo', rate: 5.99 }] })
            };
        }

        // Update order summary
        function updateOrderSummary() {
            const bookPrice = 19.99;
            const shippingCostText = document.getElementById('shippingCost').textContent;
            const shippingCost = parseFloat(shippingCostText.replace('$', '')) || 0;
            const total = bookPrice + shippingCost;
            
            document.getElementById('totalCost').textContent = '$' + total.toFixed(2);
        }

        // Validate address and continue
        async function validateAndContinue() {
            const address1 = document.getElementById('address1').value;
            const address2 = document.getElementById('address2').value;
            const city = document.getElementById('city').value;
            const state = document.getElementById('state').value;
            const zipCode = document.getElementById('zipCode').value;
            
            // Validate required fields
            if (!address1 || !city || !state || !zipCode) {
                alert('Please fill in all required shipping address fields.');
                return;
            }
            
            if (!/^\d{5}$/.test(zipCode)) {
                alert('Please enter a valid 5-digit ZIP code.');
                return;
            }
            
            // Validate address with USPS
            try {
                const result = await uspsAPI.validateAddress(address1, address2, city, state, zipCode);
                
                if (result.error) {
                    alert('Address validation failed: ' + result.error);
                    return;
                }
                
                if (result.isValid) {
                    // Calculate shipping
                    calculateShipping();
                    // Process payment
                    processOrder();
                } else {
                    alert('Address could not be verified. Please check your address and try again.');
                }
            } catch (error) {
                console.error('Address validation error:', error);
                alert('An error occurred while validating your address. Please try again.');
            }
        }

        // Calculate shipping rates
        async function calculateShipping() {
            const zipCode = document.getElementById('zipCode').value;
            
            if (!zipCode || !/^\d{5}$/.test(zipCode)) {
                document.getElementById('shippingCost').textContent = 'Invalid ZIP';
                updateOrderSummary();
                return;
            }
            
            try {
                // Use a fixed origin ZIP
                const originZip = '10001'; // New York, NY as example
                
                const result = await uspsAPI.getShippingRates(originZip, zipCode);
                
                if (result.error) {
                    document.getElementById('shippingCost').textContent = 'Error';
                    updateOrderSummary();
                    return;
                }
                
                // Display shipping rates
                const rates = result.rates;
                if (rates && rates.length > 0) {
                    // Use first rate (usually Ground Advantage)
                    document.getElementById('shippingCost').textContent = '$' + rates[0].rate.toFixed(2);
                    updateOrderSummary();
                } else {
                    document.getElementById('shippingCost').textContent = 'Error';
                    updateOrderSummary();
                }
                
            } catch (error) {
                console.error('Shipping calculation error:', error);
                document.getElementById('shippingCost').textContent = 'Error';
                updateOrderSummary();
            }
        }

        // Process order
        async function processOrder() {
            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
            
            // Get form data
            const orderData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address1: document.getElementById('address1').value,
                address2: document.getElementById('address2').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                zipCode: document.getElementById('zipCode').value,
                bookPrice: 19.99,
                shippingCost: document.getElementById('shippingCost').textContent,
                total: document.getElementById('totalCost').textContent,
                paymentMethod: paymentMethod
            };
            
            // Show processing state
            const orderBtn = event.target;
            const originalText = orderBtn.textContent;
            orderBtn.textContent = 'Processing...';
            orderBtn.disabled = true;
            
            try {
                // Demo order processing - always succeeds
                await new Promise(resolve => setTimeout(resolve, 2000)); // Simulate processing
                
                // Show success message
                alert('Order processed successfully!\n\nOrder Details:\n' +
                      'Book: Bloom Anyway - $19.99\n' +
                      'Shipping: ' + orderData.shippingCost + '\n' +
                      'Total: ' + orderData.total + '\n\n' +
                      'You will receive a confirmation email shortly at: ' + orderData.email);
                
                // Redirect to success page or back to home
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('Order processing error:', error);
                alert('Order failed: ' + error.message);
                
                // Reset button
                orderBtn.textContent = originalText;
                orderBtn.disabled = false;
            }
        }

        // Auto-calculate shipping when ZIP changes
        document.getElementById('zipCode').addEventListener('blur', calculateShipping);
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateOrderSummary();
        });
    </script>
</body>
</html>
