<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Bloom Anyway - Chioma Omeniho</title>
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" ry="14" fill="%230f172a"/><text x="50%" y="52%" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="26" fill="white">BA</text></svg>'>
    <meta name="description" content="Order your copy of Bloom Anyway by Chioma Omeniho. Choose between local pickup or standard shipping.">
    <meta name="keywords" content="bloom anyway, chioma omeniho, order book, purchase book">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        .serif { font-family: 'Playfair Display', serif; }
        .sans { font-family: 'Inter', sans-serif; }
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }
        
        .payment-option {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(0);
        }
        
        .payment-option:hover {
            border-color: rgb(148 163 184);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .payment-option:active {
            transform: translateY(0);
        }
        
        .buy-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .buy-button:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .buy-button:active {
            transform: scale(0.98);
        }
        
        .buy-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .buy-button:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .price-tag {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @media (max-width: 768px) {
            .payment-option {
                padding: 1.5rem;
            }
            
            .payment-option h3 {
                font-size: 1.25rem;
                line-height: 1.75rem;
            }
            
            .price-tag {
                font-size: 2rem;
                line-height: 2.5rem;
            }
            
            .buy-button {
                padding: 0.75rem 1.5rem;
                font-size: 0.875rem;
            }
        }
        
        @media (max-width: 480px) {
            .payment-option {
                padding: 1rem;
            }
            
            .payment-option h3 {
                font-size: 1.125rem;
                line-height: 1.5rem;
            }
            
            .payment-option p {
                font-size: 0.875rem;
                line-height: 1.25rem;
            }
            
            .price-tag {
                font-size: 1.75rem;
                line-height: 2.25rem;
            }
        }
    </style>
</head>
<body class="bg-slate-50">
    <header class="sticky top-0 z-50 border-b border-slate-200 bg-white/95 backdrop-blur">
        <nav class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3 sm:px-6 sm:py-4">
            <a href="/" class="serif text-xl sm:text-2xl font-bold tracking-tight text-slate-900">
                Bloom Anyway
            </a>
            <!-- Desktop Navigation -->
            <div class="hidden items-center gap-4 sm:gap-6 text-sm font-medium text-slate-700 md:flex">
                <button type="button" onclick="window.location.href='/'" class="hover:text-slate-900 transition">
                    Home
                </button>
                <button type="button" onclick="window.location.href='/#content'" class="hover:text-slate-900 transition">
                    About
                </button>
                <button type="button" onclick="window.location.href='/#author'" class="hover:text-slate-900 transition">
                    Author
                </button>
                <button type="button" onclick="window.location.href='/#testimonials'" class="hover:text-slate-900 transition">
                    Testimonials
                </button>
                <button type="button" onclick="window.location.href='/#purchase'" class="hover:text-slate-900 transition">
                    Purchase
                </button>
            </div>
            <!-- Mobile Navigation -->
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='/'" class="hidden sm:flex rounded-xl bg-slate-900 px-3 sm:px-4 py-2 text-xs sm:text-sm font-semibold text-white shadow-sm hover:bg-slate-800 transition">
                    Back to Home
                </button>
                <button onclick="toggleMobileMenu()" class="md:hidden text-slate-600 hover:text-slate-900 transition p-2">
                    <i class="fas fa-bars text-lg"></i>
                </button>
            </div>
        </nav>
        <!-- Mobile Menu -->
        <div id="mobileMenu" class="hidden md:hidden border-t border-slate-200 bg-white/95 backdrop-blur">
            <div class="px-4 py-3 space-y-2">
                <button onclick="window.location.href='/'; closeMobileMenu();" class="block w-full text-left px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition">
                    Home
                </button>
                <button onclick="window.location.href='/#content'; closeMobileMenu();" class="block w-full text-left px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition">
                    About
                </button>
                <button onclick="window.location.href='/#author'; closeMobileMenu();" class="block w-full text-left px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition">
                    Author
                </button>
                <button onclick="window.location.href='/#testimonials'; closeMobileMenu();" class="block w-full text-left px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition">
                    Testimonials
                </button>
                <button onclick="window.location.href='/#purchase'; closeMobileMenu();" class="block w-full text-left px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 rounded-lg transition">
                    Purchase
                </button>
                <button onclick="window.location.href='/'" class="w-full rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-slate-800 transition mt-2">
                    Back to Home
                </button>
            </div>
        </div>
    </header>

    <main class="min-h-screen bg-slate-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
            <div class="max-w-3xl mx-auto">
                <!-- Header -->
                <div class="text-center mb-8 sm:mb-12">
                    <h1 class="serif text-3xl sm:text-4xl font-bold tracking-tight text-slate-900 mb-4">
                        Order Bloom Anyway
                    </h1>
                    <p class="text-lg sm:text-xl text-slate-600">
                        Choose your preferred payment option below
                    </p>
                </div>

                <!-- Payment Options -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 lg:gap-8">
                    <div class="payment-option rounded-2xl border border-slate-200 bg-white p-4 sm:p-6 lg:p-8 cursor-pointer transition-all duration-300 shadow-sm hover:shadow-xl">
                        <div class="flex flex-col h-full">
                            <div class="flex-grow">
                                <h3 class="text-xl sm:text-2xl font-bold text-slate-900 mb-3">Local Pickup</h3>
                                <p class="text-slate-600 mb-2 text-sm sm:text-base">No shipping fee</p>
                                <p class="text-slate-500 text-xs sm:text-sm">Pickup in Denver, CO</p>
                            </div>
                            <div class="mt-4 sm:mt-6 text-left">
                                <div class="price-tag text-2xl sm:text-3xl font-bold mb-4">$20.00</div>
                                <a href="https://buy.stripe.com/3cIcN59bUdiv2eIdFC6wE01" target="_blank" class="buy-button inline-flex items-center rounded-xl bg-slate-900 px-4 sm:px-6 lg:px-8 py-2.5 sm:py-3 lg:py-4 text-sm sm:text-base font-semibold text-white shadow-lg relative z-10">
                                    <i class="fas fa-credit-card mr-2"></i>
                                    <span>Buy Now</span>
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="payment-option rounded-2xl border border-slate-200 bg-white p-4 sm:p-6 lg:p-8 cursor-pointer transition-all duration-300 shadow-sm hover:shadow-xl">
                        <div class="flex flex-col h-full">
                            <div class="flex-grow">
                                <h3 class="text-xl sm:text-2xl font-bold text-slate-900 mb-3">Standard Shipping</h3>
                                <p class="text-slate-600 mb-2 text-sm sm:text-base">+ shipping fee within US</p>
                                <p class="text-slate-500 text-xs sm:text-sm">5-7 business days delivery</p>
                            </div>
                            <div class="mt-4 sm:mt-6 text-left">
                                <div class="price-tag text-2xl sm:text-3xl font-bold mb-4">$35.00</div>
                                <a href="https://buy.stripe.com/dRm3cvbk20vJ7z2gRO6wE02" target="_blank" class="buy-button inline-flex items-center rounded-xl bg-slate-900 px-4 sm:px-6 lg:px-8 py-2.5 sm:py-3 lg:py-4 text-sm sm:text-base font-semibold text-white shadow-lg relative z-10">
                                    <i class="fas fa-credit-card mr-2"></i>
                                    <span>Buy Now</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Back to Website -->
                <div class="text-center mt-8 sm:mt-12 lg:mt-16">
                    <a href="/" class="inline-flex items-center rounded-2xl border-2 border-slate-200 bg-white px-6 sm:px-8 lg:px-10 py-3 sm:py-4 lg:py-5 text-sm sm:text-base font-semibold text-slate-700 hover:border-slate-300 hover:bg-slate-50 transition-all duration-300 transform hover:scale-105 shadow-sm hover:shadow-md">
                        <i class="fas fa-arrow-left mr-2 sm:mr-3"></i>
                        <span>Back to Website</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Mobile menu toggle
        function toggleMobileMenu() {
            const mobileMenu = document.getElementById('mobileMenu');
            mobileMenu.classList.toggle('hidden');
        }

        function closeMobileMenu() {
            const mobileMenu = document.getElementById('mobileMenu');
            mobileMenu.classList.add('hidden');
        }

        // Close mobile menu when clicking outside
        document.addEventListener('click', function(event) {
            const mobileMenu = document.getElementById('mobileMenu');
            const mobileMenuButton = event.target.closest('button[onclick="toggleMobileMenu()"]');
            
            if (!mobileMenuButton && !mobileMenu.contains(event.target)) {
                closeMobileMenu();
            }
        });
    </script>
</body>
</html>
